<style>
  :root{
    --bg:#FBFAF8; --card:#fff; --ink:#1B2333; --sub:#8C8881; --line:#ECE9E4;

  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}

  .tnum{font-variant-numeric:tabular-nums}

  @keyframes pop{0%{transform:scale(.92)}60%{transform:scale(1.05)}100%{transform:scale(1)}}

  @keyframes rise{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

  @media (prefers-reduced-motion:reduce){.pop,.rise{animation:none}}
  ::-webkit-scrollbar{display:none}
</style>

/* ───────── STORAGE (durable on device; memory fallback in preview) ───────── */
const APP_VERSION="v3 · 18 Jun 2026";
let mem=null;
const DB={
  read(){ try{const r=localStorage.getItem("scos_v1");return r?JSON.parse(r):null}catch(e){return mem} },
  write(s){ try{localStorage.setItem("scos_v1",JSON.stringify(s))}catch(e){mem=s} }
};
const todayStr=()=>new Date().toISOString().slice(0,10);
const fmtDay=d=>new Date(d).toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"});
function blank(){return{v:3,rotationIndex:0,xp:0,history:[],exHistory:{},activeDates:[],bestStreak:0,drafts:{},habits:{},phase:1,assessments:{}}}
function latestTest(id){const a=(S.assessments&&S.assessments[id])||[];return a.length?a[a.length-1].val:null}
function testCurrent(t){const v=latestTest(t.id);return v==null?t.base:v}
function gateMet(t,phase){const g=t.gates[phase];if(g==null)return true;const c=testCurrent(t);return t.dir==="up"?c>=g:c<=g}
function phaseProgress(phase){const rel=TESTS.filter(t=>t.gates[phase]!=null);const met=rel.filter(t=>gateMet(t,phase)).length;return{met,total:rel.length,ready:met===rel.length}}
function freshSession(type){const e={};prog(S.phase,type).forEach(x=>e[x.id]=Array.from({length:x.sets},()=>null));return{type,date:todayStr(),entries:e,effort:{}}}
function computeStreak(dates){if(!dates.length)return 0;const set=new Set(dates);let cur=todayStr();if(!set.has(cur)){const y=new Date();y.setDate(y.getDate()-1);cur=y.toISOString().slice(0,10);if(!set.has(cur))return 0}let n=0;while(set.has(cur)){n++;const d=new Date(cur);d.setDate(d.getDate()-1);cur=d.toISOString().slice(0,10)}return n}

/* ───────── STATE ───────── */
let S={...blank(),...(DB.read()||{})};
if(S.current){ S.drafts=S.drafts||{}; if(!S.drafts[S.current.type]) S.drafts[S.current.type]=S.current; delete S.current; }
if(!S.drafts) S.drafts={}; if(!S.assessments) S.assessments={}; if(!S.phase) S.phase=1;
function draft(type){ if(!S.drafts[type]) S.drafts[type]=freshSession(type); return S.drafts[type]; }
let UI={tab:"home",activeSet:null,detail:null,viewDay:ROTATION[S.rotationIndex%3],testDraft:{},previewPhase:S.phase};
function cur(){ return draft(UI.viewDay); }
function save(){DB.write(S)}
function setS(fn){fn(S);save();render()}

/* ───────── HELPERS ───────── */
function lastFor(id){const h=S.exHistory[id];return h&&h.length?h[h.length-1]:null}
function targetFor(ex){
  const last=lastFor(ex.id);
  if(!last)return{kg:ex.load==="kg"?0:null,reps:ex.reps,coach:"First time — find your working weight",up:null};
  const topKg=Math.max(0,...last.sets.filter(x=>x&&x.kg).map(x=>x.kg));
  const hitAll=last.sets.filter(x=>x&&x.reps>=ex.reps).length>=ex.sets;
  let kg=topKg,coach,up=true;
  if(last.effort==="hard"){coach="Hold load, nail form";up=false;}
  else if(hitAll){kg=ex.load==="kg"?+(topKg+2.5).toFixed(1):topKg;coach="Coach: +2.5 kg";}
  else{coach="Match last, add a rep";}
  const lastStr=last.sets.filter(Boolean).map(x=>ex.load==="kg"&&x.kg?`${x.kg}×${x.reps}`:x.reps).join(", ")||"—";
  return{kg,reps:ex.reps,coach,up,lastStr};
}

  }).join("");
  return `<div style="padding:22px 18px">
    <div style="font-size:26px;font-weight:800;letter-spacing:-.4px">The Plan</div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:16px">Where you stand, where you're headed — and why.</div>

    <div style="background:var(--navy);color:#fff;border-radius:18px;padding:18px;margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;opacity:.7;text-transform:uppercase;letter-spacing:.6px">${P.floor} · Phase ${ph} of 4</div>
      <div style="font-size:22px;font-weight:800;margin:2px 0 8px">${P.name}</div>
      <div style="font-size:13.5px;line-height:1.5;opacity:.92">${P.why}</div>
      <div style="margin-top:14px;display:flex;align-items:center;gap:10px">
        <div style="flex:1;height:8px;background:rgba(255,255,255,.2);border-radius:999px;overflow:hidden"><div style="width:${pp.total?pp.met/pp.total*100:0}%;height:100%;background:#fff"></div></div>

    ${pp.ready?`<div style="background:var(--greenSoft);border:1px solid #BFE0CE;border-radius:16px;padding:16px;margin-bottom:16px">
      <div style="font-weight:800;color:#3F6F58;margin-bottom:4px">🎯 Phase ${ph} complete — foundation proven</div>
      <div style="font-size:13.5px;color:#3F6F58;line-height:1.5">Every gate is green. ${PROGRAM[ph+1]?`You've earned <b>Phase ${ph+1} — ${PHASES[ph+1].name}</b>. Tap below to level up; your exercises switch and the reasons are saved in your log.`:`Message your coach: <b>"Ready for Phase ${ph+1}"</b> and I'll program ${PHASES[ph+1]?PHASES[ph+1].name:"the next floor"} from your real numbers — with reasons.`}</div>

    <div style="font-size:12px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin:18px 2px 10px">Why your plan looks like this</div>
    ${CHANGELOG.map(c=>`<div style="background:#fff;border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin-bottom:8px">

      <b>Principles this app follows:</b> exercises are chosen by real need, not by what gear you own. Foundation before progression — no skipping floors. Bodyweight & GMB-style mobility count fully where they serve the goal. Goals can change; the base never gets skipped.
    </div>

}
function progressHTML(streak,level,levelPct){
  const totalSessions=S.history.length;
  const now=new Date(),wk=new Date(now);wk.setDate(now.getDate()-now.getDay());
  const weekCount=S.history.filter(h=>new Date(h.date)>=wk).length;
  const data=S.history.slice(-12);
  return `<div style="padding:22px 18px">
    <div style="font-size:26px;font-weight:800;letter-spacing:-.4px">Progress</div>
    <div style="font-size:13px;color:var(--sub);margin-bottom:18px">Show up. Watch the line climb.</div>
    <div style="display:flex;gap:12px;margin-bottom:14px">
      ${stat(streak,"day streak","🔥","var(--amberSoft)")}
      ${stat(totalSessions,"sessions","🗓️","var(--blueSoft)")}
      ${stat(level,"Lv · "+(300-(S.xp%300))+"xp","🏆","var(--greenSoft)")}
    </div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:8px"><span>Level ${level}</span><span style="color:var(--sub)">${Math.round(levelPct)}%</span></div>
      <div style="height:10px;background:var(--line);border-radius:999px;overflow:hidden"><div style="width:${levelPct}%;height:100%;background:linear-gradient(90deg,var(--blue),var(--navy))"></div></div></div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px;display:flex;align-items:center;gap:16px">
      <div style="display:flex;gap:6px">${[0,1,2].map(i=>`<div style="width:20px;height:20px;border-radius:999px;background:${i<weekCount?'var(--green)':'var(--line)'}"></div>`).join("")}</div>
      <div><div style="font-size:15px;font-weight:700">${weekCount} / 3 this week</div><div style="font-size:12.5px;color:var(--sub)">${weekCount>=3?"Week complete — outstanding.":"Keep the rotation moving."}</div></div></div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px">Work per session</div>
      ${data.length?chartSVG(data):'<div style="padding:24px 0;text-align:center;color:var(--sub);font-size:14px">Log your first session to start the line.</div>'}</div>
    <div style="font-size:12px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin:6px 2px 10px">Milestones</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
      ${MILES.map(m=>{const g=m.n(S);return `<div style="background:${g?'var(--navy)':'#fff'};border:1px solid ${g?'var(--navy)':'var(--line)'};border-radius:14px;padding:14px;display:flex;align-items:center;gap:10px"><span style="font-size:16px">${g?'🏆':'🔒'}</span><span style="font-size:13.5px;font-weight:700;color:${g?'#fff':'var(--sub)'}">${m.l}</span></div>`}).join("")}</div>

    <div style="font-size:12px;font-weight:800;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;margin:22px 2px 10px">Your data</div>
    <div style="background:#fff;border:1px solid var(--line);border-radius:16px;padding:6px">
      <button data-export style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:none;border:none;font-size:15px;font-weight:600"><span>⬇️ Export backup</span><span style="color:var(--sub);font-size:13px">${totalSessions} sessions</span></button>
      <label style="display:flex;justify-content:space-between;align-items:center;padding:13px 14px;border-top:1px solid var(--line);font-size:15px;font-weight:600"><span>⬆️ Import backup</span><input type="file" accept="application/json" data-import style="display:none"><span style="color:var(--blue);font-size:13px">Choose file</span></label>
    </div>
    <div style="text-align:center;font-size:12px;color:var(--sub);margin-top:14px;line-height:1.5">Rotation: Lower → Upper → Athletic. Miss a day and today simply waits.<br>Your history lives on this device — export a backup before any big change.</div>
  </div>`;
}
function stat(big,label,emoji,tint){return `<div style="flex:1;background:${tint};border-radius:16px;padding:14px 12px"><div style="margin-bottom:6px;font-size:18px">${emoji}</div><div class="tnum" style="font-size:26px;font-weight:800;line-height:1">${big}</div><div style="font-size:11.5px;color:var(--sub);font-weight:600;margin-top:3px">${label}</div></div>`}
function chartSVG(data){
  const W=400,H=150,P=10,vals=data.map(d=>d.volume),max=Math.max(...vals,1),min=Math.min(...vals,0);
  const x=i=>P+i*(W-2*P)/Math.max(1,data.length-1), y=v=>H-P-(v-min)/(max-min||1)*(H-2*P);
  const pts=data.map((d,i)=>`${x(i)},${y(d.volume)}`);
  const line=pts.map((p,i)=>(i?"L":"M")+p).join(" ");
  const area=`M${x(0)},${H-P} L`+pts.join(" L")+` L${x(data.length-1)},${H-P} Z`;
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:160px" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#5B7CB8" stop-opacity=".35"/><stop offset="100%" stop-color="#5B7CB8" stop-opacity=".02"/></linearGradient></defs>
    <path d="${area}" fill="url(#g)"/><path d="${line}" fill="none" stroke="#1E2A44" stroke-width="2.5" stroke-linejoin="round"/>
    ${data.map((d,i)=>`<circle cx="${x(i)}" cy="${y(d.volume)}" r="3" fill="#1E2A44"/>`).join("")}
  </svg>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-top:4px"><span>${fmtDay(data[0].date).slice(0,6)}</span><span>${fmtDay(data[data.length-1].date).slice(0,6)}</span></div>`;
}

/* ───────── ACTIONS ───────── */
function finish(){
  const type=UI.viewDay, ex=prog(S.phase,type), d=draft(type);let vol=0,sd=0;
  ex.forEach(e=>{const arr=d.entries[e.id];arr.forEach(c=>{if(c&&c.reps){vol+=(c.kg||0)*c.reps||c.reps;sd++}});S.exHistory[e.id]=S.exHistory[e.id]||[];S.exHistory[e.id].push({date:todayStr(),sets:arr,effort:d.effort[e.id]||null})});
  if(sd===0)return;
  S.history.push({date:todayStr(),type,volume:Math.round(vol),sets:sd});
  if(!S.activeDates.includes(todayStr()))S.activeDates.push(todayStr());
  S.xp+=sd*10+50;S.bestStreak=Math.max(S.bestStreak,computeStreak(S.activeDates));
  S.rotationIndex=ROTATION.indexOf(type)+1;delete S.drafts[type];
  UI.viewDay=ROTATION[S.rotationIndex%3];UI.tab="progress";UI.activeSet=null;save();render();
}
function exportBackup(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="strength-backup-"+todayStr()+".json";a.click();
}
function importBackup(file){
  const r=new FileReader();r.onload=()=>{try{const j=JSON.parse(r.result);if(!j.history)throw 0;S={...blank(),...j};if(S.current){S.drafts=S.drafts||{};if(!S.drafts[S.current.type])S.drafts[S.current.type]=S.current;delete S.current;}if(!S.drafts)S.drafts={};UI.viewDay=ROTATION[S.rotationIndex%3];UI.activeSet=null;save();render();alert("Backup restored — "+S.history.length+" sessions.")}catch(e){alert("That file didn't look like a valid backup.")}};r.readAsText(file);
}

/* ───────── EVENTS (delegation) ───────── */
document.body.addEventListener("click",e=>{
  const t=e.target.closest("[data-tab],[data-day],[data-set],[data-step],[data-clear],[data-done],[data-eff],[data-habit],[data-detail],[data-finish],[data-export],[data-close],[data-stop],[data-tstep],[data-logtest],[data-pphase],[data-advance],[data-start],[data-howtest]");
  if(!t)return;
  if(t.dataset.stop!==undefined&&t===e.target)return;
  if(t.dataset.tab){UI.tab=t.dataset.tab;UI.activeSet=null;render();return}
  if(t.dataset.start!==undefined){UI.viewDay=ROTATION[S.rotationIndex%3];UI.tab="today";UI.activeSet=null;render();return}
  if(t.dataset.howtest){UI.testHow=t.dataset.howtest;render();return}
  if(t.dataset.pphase){UI.previewPhase=+t.dataset.pphase;render();return}
  if(t.dataset.advance){const np=S.phase+1;if(PROGRAM[np]){S.phase=np;S.drafts={};UI.viewDay=ROTATION[S.rotationIndex%3];UI.previewPhase=np;UI.tab="today";save();render();}return}
  if(t.dataset.day){UI.viewDay=t.dataset.day;UI.activeSet=null;render();return}
  if(t.dataset.detail){UI.detail=findEx(t.dataset.detail);render();return}
  if(t.dataset.close!==undefined){UI.detail=null;UI.testHow=null;render();return}
  if(t.dataset.set){UI.activeSet=UI.activeSet===t.dataset.set?null:t.dataset.set;render();return}
  if(t.dataset.done){UI.activeSet=null;render();return}
  if(t.dataset.finish!==undefined){finish();return}
  if(t.dataset.export!==undefined){exportBackup();return}
  if(t.dataset.tstep){const[id,delta]=t.dataset.tstep.split(":");const tt=TESTS.find(x=>x.id===id);const base=UI.testDraft[id]??testCurrent(tt);UI.testDraft[id]=Math.max(0,+(base+ +delta).toFixed(2));render();return}
  if(t.dataset.logtest){const id=t.dataset.logtest;const tt=TESTS.find(x=>x.id===id);const val=UI.testDraft[id]??testCurrent(tt);S.assessments[id]=S.assessments[id]||[];S.assessments[id].push({date:todayStr(),val});delete UI.testDraft[id];save();render();return}
  if(t.dataset.clear){const[id,i]=t.dataset.clear.split(":");setS(()=>{cur().entries[id][+i]=null});return}
  if(t.dataset.habit){const d=todayStr();setS(()=>{S.habits[d]=S.habits[d]||{};S.habits[d][t.dataset.habit]=!S.habits[d][t.dataset.habit];const any=Object.values(S.habits[d]).some(Boolean);if(any&&!S.activeDates.includes(d))S.activeDates.push(d);if(!any&&!S.history.some(h=>h.date===d))S.activeDates=S.activeDates.filter(x=>x!==d);S.xp=Math.max(0,S.xp+(S.habits[d][t.dataset.habit]?5:-5));S.bestStreak=Math.max(S.bestStreak,computeStreak(S.activeDates))});return}
  if(t.dataset.eff){const[id,v]=t.dataset.eff.split(":");setS(()=>{cur().effort[id]=cur().effort[id]===v?null:v});return}
  if(t.dataset.step){const[id,i,field,delta]=t.dataset.step.split(":");setS(()=>{const arr=cur().entries[id];const cell=arr[+i]||{};const ex=prog(S.phase,UI.viewDay).find(x=>x.id===id);const t2=targetFor(ex);let base=cell[field];if(base==null)base=field==="kg"?(t2.kg||0):t2.reps;let nv=Math.max(0,+(base+ +delta).toFixed(2));const patch={};patch[field]=nv;if(field==="reps"&&ex.load==="kg"&&cell.kg==null)patch.kg=t2.kg||0;if(field==="kg"&&cell.reps==null)patch.reps=t2.reps;arr[+i]={...cell,...patch}});return}
});
document.body.addEventListener("change",e=>{
  const inp=e.target.closest("[data-input]");
  if(inp){const[id,i,field]=inp.dataset.input.split(":");const v=parseFloat(inp.value);setS(()=>{const arr=cur().entries[id];const cell=arr[+i]||{};const ex=prog(S.phase,UI.viewDay).find(x=>x.id===id);const t2=targetFor(ex);const patch={};patch[field]=isNaN(v)?0:v;if(field==="reps"&&ex.load==="kg"&&cell.kg==null)patch.kg=t2.kg||0;if(field==="kg"&&cell.reps==null)patch.reps=t2.reps;arr[+i]={...cell,...patch}})}
  const imp=e.target.closest("[data-import]");
  if(imp&&imp.files[0])importBackup(imp.files[0]);
  const tin=e.target.closest("[data-tinput]");
  if(tin){const v=parseFloat(tin.value);UI.testDraft[tin.dataset.tinput]=isNaN(v)?0:v;}
});

/* ───────── PWA: manifest + install + offline ───────── */
function icon(size){const c=document.createElement("canvas");c.width=c.height=size;const x=c.getContext("2d");x.fillStyle="#1E2A44";const r=size*0.22;x.beginPath();x.roundRect(0,0,size,size,r);x.fill();x.fillStyle="#fff";x.font="bold "+size*0.52+"px ui-sans-serif,system-ui,sans-serif";x.textAlign="center";x.textBaseline="middle";x.fillText("S",size/2,size*0.55);return c.toDataURL("image/png")}
try{
  const manifest={name:"Strength Code OS",short_name:"Strength",start_url:".",scope:".",display:"standalone",background_color:"#FBFAF8",theme_color:"#FBFAF8",icons:[{src:icon(192),sizes:"192x192",type:"image/png",purpose:"any maskable"},{src:icon(512),sizes:"512x512",type:"image/png",purpose:"any maskable"}]};
  const link=document.createElement("link");link.rel="manifest";link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"}));document.head.appendChild(link);
  let appleIcon=document.createElement("link");appleIcon.rel="apple-touch-icon";appleIcon.href=icon(180);document.head.appendChild(appleIcon);
}catch(e){}
if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}))}
let deferred=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferred=e;showInstall()});
function showInstall(){if(document.getElementById("installbtn"))return;const b=document.createElement("button");b.id="installbtn";b.textContent="⤓ Install app to home screen";b.style.cssText="position:fixed;left:16px;right:16px;bottom:96px;max-width:448px;margin:0 auto;background:var(--navy);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:700;z-index:60;box-shadow:0 10px 26px rgba(0,0,0,.2)";b.onclick=async()=>{b.remove();if(deferred){deferred.prompt();await deferred.userChoice;deferred=null}};document.body.appendChild(b);setTimeout(()=>b.remove(),12000)}

render();
